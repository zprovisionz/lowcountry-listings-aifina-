<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lowcountry Listings AI — Charleston's AI Listing Platform</title>
    <meta name="description" content="AI-powered real estate listing generation built exclusively for Charleston, SC. Hyper-local intelligence, verified landmark distances, virtual staging — MLS-ready copy in seconds." />
    <meta name="theme-color" content="#0a0a1f" />

    <!-- Callback for Google Maps (must exist before app injects script) -->
    <script>
      window.initGoogleMaps = function() {
        window.googleMapsReady = true;
        window.dispatchEvent(new Event('googleMapsReady'));
      };
    </script>

    <!-- Fonts: Syne (display) + Space Mono (mono) + DM Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Critical: prevent FOUC */
      html { background: #0a0a1f; }
      #root { opacity: 0; animation: rootFadeIn .4s .1s ease forwards; }
      @keyframes rootFadeIn { to { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
